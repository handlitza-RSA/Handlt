<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handlt - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://lfkssodbanjfamwpscja.supabase.co';
        const supabaseKey = 'sb_publishable_5v0yi1RUIc0fhOSBVRiYmg_rCAHZzQG';
        const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);
    </script>
</head>
<body class="bg-zinc-100 font-sans min-h-screen flex">

    <aside class="w-64 bg-zinc-950 text-white flex flex-col shadow-xl">
        <div class="p-5 border-b border-zinc-800 flex items-center space-x-3">
            <div class="bg-white text-black font-bold h-8 w-8 rounded flex items-center justify-center text-md">H</div>
            <span class="font-bold tracking-wider text-lg">HANDLT ADMIN</span>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="#" class="flex items-center space-x-3 bg-zinc-800 text-white p-3 rounded-lg font-medium transition">
                <i class="fa-solid fa-list-check w-5 text-red-500"></i>
                <span>Client Inquiries</span>
            </a>
        </nav>
        <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500 font-mono text-center">
            Handlt Dashboard v1.0
        </div>
    </aside>

    <main class="flex-grow p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-zinc-900">Inbound Requests</h1>
                <p class="text-sm text-zinc-500">Real-time incoming client calculator entries from your live portal.</p>
            </div>
            <button onclick="fetchRequests()" class="bg-white border text-zinc-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-zinc-50 shadow-sm flex items-center space-x-2 transition">
                <i class="fa-solid fa-arrow-rotate-right"></i> <span>Refresh Data</span>
            </button>
        </header>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-zinc-50 border-b text-zinc-400 text-xs font-bold uppercase tracking-wider">
                        <th class="p-4">Submission Date</th>
                        <th class="p-4">WhatsApp Contact</th>
                        <th class="p-4">Equipment Requirements / Notes</th>
                        <th class="p-4 text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="submissionsTableBody" class="text-zinc-700 text-sm font-medium">
                    <tr>
                        <td colspan="4" class="p-8 text-center text-zinc-400 font-mono">Loading data from Supabase cloud database...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchRequests() {
            const tableBody = document.getElementById('submissionsTableBody');
            
            // Query data directly from your client_requests table
            const { data, error } = await supabase
                .from('client_requests')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Fetch failed:", error);
                tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-mono">Error: Make sure your table is named 'client_requests' in your Supabase console.</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-zinc-400 font-mono">No customer requests found in database yet.</td></tr>`;
                return;
            }

            // Clear table row placeholders
            tableBody.innerHTML = '';

            // Map database columns to UI components dynamically
            data.forEach(row => {
                const date = new Date(row.created_at).toLocaleString();
                const phone = row.whatsapp_number || 'N/A';
                const notes = row.notes || 'No notes left by user.';
                
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-zinc-50 transition";
                tr.innerHTML = `
                    <td class="p-4 text-zinc-500 font-mono text-xs">${date}</td>
                    <td class="p-4 font-bold text-zinc-900">${phone}</td>
                    <td class="p-4 max-w-md text-zinc-600">${notes}</td>
                    <td class="p-4 text-center">
                        <span class="bg-amber-50 border border-amber-200 text-amber-700 text-xs px-2.5 py-1 rounded-full font-semibold">New Entry</span>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // Run fetch execution on window mount
        window.onload = fetchRequests;
    </script>
</body>
</html>
