<!DOCTYPE html>
<html>
<head>
  <title>HNDLT Admin Suite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-100 text-zinc-900 font-sans min-h-screen">

  <div class="bg-black text-white p-6 shadow-xl flex flex-col md:flex-row justify-between items-center border-b border-zinc-800">
    <div>
      <h1 class="text-3xl font-black tracking-tight flex items-center space-x-2">
        <span class="bg-white text-black px-2 py-0.5 rounded font-black text-xl">H</span>
        <span>HNDLT LEAD INTELLIGENCE SYSTEM</span>
      </h1>
      <p class="text-zinc-400 text-xs font-mono uppercase tracking-widest mt-1">Live Technical Specifications & Booking Workspace</p>
    </div>
    <div class="mt-4 md:mt-0 flex items-center space-x-3">
      <button onclick="loadLeads()" class="bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-white font-bold py-2.5 px-5 rounded-xl text-sm transition shadow-sm flex items-center space-x-2">
        <i class="fa-solid fa-arrows-rotate text-zinc-400"></i>
        <span>Refresh Ledger</span>
      </button>
    </div>
  </div>

  <main class="max-w-5xl mx-auto p-6">
    <div id="leads-container" class="grid gap-6">
      <div class="text-center p-16 text-zinc-400 font-medium bg-white border rounded-2xl shadow-sm">
         <i class="fa-solid fa-spinner animate-spin text-2xl mb-2 text-zinc-400 block"></i> Mining secure storage ledgers...
      </div>
    </div>
  </main>

  <script>
    const supabaseUrl = "https://lfkssodbanjfamwpscja.supabase.co";
    const supabaseKey = "sb_publishable_5v0yi1RUIc0fhOSBVRiYmg_rCAHZzQG";
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    // Live update function to alter inquiry statuses on the fly
    async function updateStatus(leadId, newStatus) {
      const { error } = await db
        .from("client_requests")
        .update({ status: newStatus })
        .eq('id', leadId);

      if (error) {
        alert("Update Error: " + error.message);
      } else {
        loadLeads(); // Instantly refresh layout parameters
      }
    }

    async function loadLeads() {
      const container = document.getElementById("leads-container");
      container.innerHTML = `
        <div class="text-center p-16 text-zinc-400 font-medium bg-white border rounded-2xl shadow-sm">
           <i class="fa-solid fa-spinner animate-spin text-2xl mb-2 text-zinc-400 block"></i> Syncing cloud database entries...
        </div>`;

      const { data, error } = await db
        .from("client_requests")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        container.innerHTML = `<div class="bg-red-50 text-red-600 p-6 rounded-xl border border-red-200 font-bold">Inquiry Sync Failure: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="text-center p-16 text-zinc-400 font-medium bg-white border rounded-2xl shadow-sm">
             <i class="fa-solid fa-folder-open text-3xl block text-zinc-200 mb-3"></i> No consumer quote requests found.
          </div>`;
        return;
      }

      container.innerHTML = "";

      data.forEach(lead => {
        const card = document.createElement("div");
        card.className = "bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden transition-all duration-300";

        // Date Parser Calculations
        const stamp = lead.created_at ? new Date(lead.created_at) : null;
        const formattedDate = stamp ? stamp.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : "N/A";
        const cleanPhone = lead.whatsapp_number ? lead.whatsapp_number.replace(/[^0-9]/g, '') : '';

        // Conditional pill coloring based on booking workflow status
        let statusClasses = "bg-zinc-900 text-white";
        if (lead.status === 'New') statusClasses = "bg-red-600 text-white animate-pulse";
        if (lead.status === 'Contacted') statusClasses = "bg-amber-500 text-black";
        if (lead.status === 'Confirmed') statusClasses = "bg-emerald-600 text-white";

        card.innerHTML = `
          <div class="bg-zinc-50 px-6 py-4 border-b border-zinc-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
            <div>
              <div class="flex items-center space-x-2">
                <h2 class="text-xl font-black text-zinc-900">${lead.full_name || "Anonymous"}</h2>
                <span class="text-xs px-2 py-0.5 bg-zinc-200 text-zinc-700 font-bold rounded">${lead.lead_source || 'Website'}</span>
              </div>
              <span class="text-xs font-mono text-zinc-400 font-semibold">${formattedDate} • Ref Record #${lead.id}</span>
            </div>
            
            <div class="flex items-center space-x-2">
              <select onchange="updateStatus(${lead.id}, this.value)" class="text-xs font-bold bg-white border p-1.5 rounded-lg focus:outline-none cursor-pointer shadow-sm">
                <option value="New" ${lead.status === 'New' ? 'selected' : ''}>New Request</option>
                <option value="Contacted" ${lead.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
                <option value="Confirmed" ${lead.status === 'Confirmed' ? 'selected' : ''}>Confirmed Booking</option>
                <option value="Cancelled" ${lead.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
              </select>
              <span class="px-3 py-1 rounded-full font-black text-xs uppercase tracking-wider ${statusClasses}">${lead.status || "New"}</span>
            </div>
          </div>

          <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 text-sm font-medium border-b border-zinc-100 bg-white">
            
            <div class="space-y-2.5">
              <h3 class="text-xs font-black uppercase text-zinc-400 tracking-widest border-b pb-1">Client Line</h3>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">WhatsApp Connection</span>
                <a href="https://wa.me/${cleanPhone}" target="_blank" class="text-emerald-600 hover:text-emerald-700 font-bold inline-flex items-center space-x-1 mt-0.5">
                  <i class="fa-brands fa-whatsapp text-base"></i>
                  <span class="underline decoration-dotted">${lead.whatsapp_number}</span>
                </a>
              </div>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">Email Address</span>
                <span class="text-zinc-700 text-xs">${lead.email || "Not Provided"}</span>
              </div>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">Event Target Date</span>
                <span class="text-zinc-900 font-black flex items-center mt-0.5"><i class="fa-regular fa-calendar text-zinc-400 mr-1.5"></i>${lead.event_date || "N/A"}</span>
              </div>
            </div>

            <div class="space-y-2.5">
              <h3 class="text-xs font-black uppercase text-zinc-400 tracking-widest border-b pb-1">Event Blueprint</h3>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">Venue Destination</span>
                <span class="text-zinc-800 font-bold flex items-center mt-0.5"><i class="fa-solid fa-location-dot text-zinc-400 mr-1.5"></i>${lead.location || "N/A"}</span>
              </div>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">Event Framework Class</span>
                <span class="text-zinc-700">${lead.event_type || "N/A"}</span>
              </div>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">Scope & Environment</span>
                <span class="text-zinc-700 font-semibold">${lead.guest_count ? lead.guest_count + ' Guests' : 'N/A'} • (${lead.indoor_outdoor || 'N/A'})</span>
              </div>
            </div>

            <div class="space-y-2.5">
              <h3 class="text-xs font-black uppercase text-zinc-400 tracking-widest border-b pb-1">Financial Parameters</h3>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">Calculated Base Pricing</span>
                <span class="text-zinc-950 font-black text-base tracking-tight">${lead.quote_value ? 'R ' + Number(lead.quote_value).toFixed(2) : 'Awaiting Custom Spec Line'}</span>
              </div>
              <div>
                <span class="block text-[11px] font-bold text-zinc-400 uppercase">Budget Bracket Limitation</span>
                <span class="text-zinc-700 font-bold">${lead.budget_range || "N/A"}</span>
              </div>
              <div class="flex items-center space-x-4 text-xs font-bold text-zinc-500 mt-1">
                <div><i class="fa-solid fa-truck text-zinc-400 mr-1"></i>Delivery: <span class="text-zinc-900">${lead.delivery_required === 'Yes' ? 'YES' : 'NO'}</span></div>
                <div><i class="fa-solid fa-screwdriver-wrench text-zinc-400 mr-1"></i>Setup: <span class="text-zinc-900">${lead.setup_required === 'Yes' ? 'YES' : 'NO'}</span></div>
              </div>
            </div>

          </div>

          <div class="px-6 py-3.5 bg-zinc-50 border-b border-zinc-100 flex items-start space-x-2 text-xs font-medium">
             <div class="w-24 text-zinc-400 uppercase font-bold tracking-wider pt-0.5 text-[10px]">Hardware Goal:</div>
             <div class="flex-1 text-zinc-900 font-bold">${lead.equipment_required || "Standard Package Specifications Only."}</div>
          </div>

          <div class="px-6 py-4 bg-zinc-50/40 text-xs leading-relaxed font-normal">
            <span class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Additional Commentary Details</span>
            <p class="text-zinc-600 italic font-medium">${lead.notes || "No extra event parameters entered by custom fields."}</p>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Run pipeline updates directly upon mounting processes
    loadLeads();
  </script>
</body>
</html>
