<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handlt - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-100 font-sans min-h-screen flex">

    <aside class="w-64 bg-zinc-950 text-white flex flex-col shadow-xl">
        <div class="p-5 border-b border-zinc-800 flex items-center space-x-3">
            <div class="bg-white text-black font-bold h-8 w-8 rounded flex items-center justify-center text-md">H</div>
            <span class="font-bold tracking-wider text-lg">HANDLT ADMIN</span>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="#" class="flex items-center space-x-3 bg-zinc-800 text-white p-3 rounded-lg font-medium transition">
                <i class="fa-solid fa-list-check w-5 text-red-500"></i>
                <span>Client Inquiries</span>
            </a>
        </nav>
        <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500 font-mono text-center">
            Handlt Dashboard v1.1
        </div>
    </aside>

    <main class="flex-grow p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-zinc-900 uppercase">Inbound Client Requests</h1>
                <p class="text-zinc-500 text-sm mt-0.5">Real-time repository sync directly from your frontend cloud application.</p>
            </div>
            <button onclick="fetchInquiries()" class="bg-white hover:bg-zinc-50 text-zinc-900 border font-bold py-2.5 px-4 rounded-xl shadow-sm text-sm transition flex items-center space-x-2">
                <i class="fa-solid fa-arrows-rotate text-zinc-400"></i>
                <span>Refresh Logs</span>
            </button>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-zinc-50 border-b border-zinc-200 text-zinc-500 font-bold uppercase text-xs tracking-wider">
                        <th class="p-4 w-16 text-center">ID</th>
                        <th class="p-4 w-48">Date Received</th>
                        <th class="p-4 w-56">WhatsApp Reference</th>
                        <th class="p-4">Requested Specifications / Notes</th>
                    </tr>
                </thead>
                <tbody id="data-table-body" class="text-sm font-medium text-zinc-800 divide-y divide-zinc-100">
                    <tr>
                        <td colspan="4" class="p-12 text-center text-zinc-400 font-medium">
                            <i class="fa-solid fa-spinner animate-spin text-xl mb-2 text-zinc-300 block"></i>
                            Fetching cloud ledger records...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://lfkssodbanjfamwpscja.supabase.co';
        const supabaseKey = 'sb_publishable_5v0yi1RUIc0fhOSBVRiYmg_rCAHZzQG';
        const supabaseAdminClient = supabaseJs.createClient(supabaseUrl, supabaseKey);

        async function fetchInquiries() {
            const tableBody = document.getElementById('data-table-body');
            
            // Query entries sorted systematically chronologically downward
            const { data: requests, error } = await supabaseAdminClient
                .from('client_requests')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="p-8 text-center text-red-500 font-bold bg-red-50">
                            <i class="fa-solid fa-circle-exclamation mr-2"></i> Sync Error: ${error.message}
                        </td>
                    </tr>`;
                console.error("Dashboard Engine Failure Details:", error);
                return;
            }

            // Fallback render logic if the remote query layer is clear of values
            if (!requests || requests.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="p-16 text-center text-zinc-400 font-medium">
                            <i class="fa-solid fa-folder-open text-3xl text-zinc-200 block mb-3"></i>
                            No clients have submitted inquiries yet.
                        </td>
                    </tr>`;
                return;
            }

            // Loop clean data entries directly into row grid elements
            tableBody.innerHTML = '';
            requests.forEach(row => {
                // Human-readable date-time conversion parsing format adjustments
                const timestamp = new Date(row.created_at);
                const formattedDate = timestamp.toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                tableBody.innerHTML += `
                    <tr class="hover:bg-zinc-50/70 transition">
                        <td class="p-4 text-center font-mono text-xs text-zinc-400">#${row.id}</td>
                        <td class="p-4 text-zinc-500 font-medium whitespace-nowrap">${formattedDate}</td>
                        <td class="p-4 whitespace-nowrap">
                            <a href="https://wa.me/${row.whatsapp_number.replace(/[^0-9]/g, '')}" target="_blank" 
                               class="inline-flex items-center space-x-1.5 text-emerald-600 hover:text-emerald-700 font-bold transition">
                                <i class="fa-brands fa-whatsapp text-md"></i>
                                <span>${row.whatsapp_number}</span>
                            </a>
                        </td>
                        <td class="p-4 text-zinc-600 leading-relaxed font-normal">${row.notes}</td>
                    </tr>`;
            });
        }

        // Auto-run ingestion fetch sequence immediately on interface mount lifecycle
        fetchInquiries();
    </script>
</body>
</html>
