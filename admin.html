```html
<!DOCTYPE html>
<html>
<head>
  <title>HNDLT Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-100 p-4">

  <h1 class="text-3xl font-black mb-6">HNDLT Admin Leads</h1>

  <button onclick="loadLeads()" class="bg-black text-white px-4 py-2 rounded-lg mb-6">
    Refresh Leads
  </button>

  <div id="leads" class="grid gap-4">Loading...</div>

  <script>
    const supabaseUrl = "https://lfkssodbanjfamwpscja.supabase.co";
    const supabaseKey = "sb_publishable_5v0yi1RUIc0fhOSBVRiYmg_rCAHZzQG";
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadLeads() {
      const container = document.getElementById("leads");
      container.innerHTML = "Loading leads...";

      const { data, error } = await db
        .from("client_requests")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        container.innerHTML = "Error: " + error.message;
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = "No leads yet.";
        return;
      }

      container.innerHTML = "";

      data.forEach(lead => {
        const card = document.createElement("div");
        card.className = "bg-white p-5 rounded-xl shadow border";

        card.innerHTML = `
          <h2 class="text-xl font-black">${lead.full_name || "No Name"}</h2>
          <p><b>WhatsApp:</b> ${lead.whatsapp_number || ""}</p>
          <p><b>Email:</b> ${lead.email || ""}</p>
          <p><b>Event Date:</b> ${lead.event_date || ""}</p>
          <p><b>Event Type:</b> ${lead.event_type || ""}</p>
          <p><b>Location:</b> ${lead.location || ""}</p>
          <p><b>Guests:</b> ${lead.guest_count || ""}</p>
          <p><b>Indoor/Outdoor:</b> ${lead.indoor_outdoor || ""}</p>
          <p><b>Package:</b> ${lead.selected_package || ""}</p>
          <p><b>Delivery:</b> ${lead.delivery_required || ""}</p>
          <p><b>Setup:</b> ${lead.setup_required || ""}</p>
          <p><b>Notes:</b> ${lead.notes || ""}</p>
          <p><b>Status:</b> ${lead.status || "New"}</p>
          <p class="text-xs text-zinc-500 mt-2">${lead.created_at || ""}</p>
        `;

        container.appendChild(card);
      });
    }

    loadLeads();
  </script>

</body>
</html>
```
