<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HNDLT Quote Request</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-100 text-zinc-900 font-sans min-h-screen">

  <div class="bg-black text-white p-6 text-center shadow-md">
    <h1 class="text-4xl font-black tracking-wider">HNDLT</h1>
    <p class="text-zinc-400 text-xs mt-1 uppercase tracking-widest">Sound • Lighting • DJ Gear • Event Solutions</p>
  </div>

  <main class="max-w-2xl mx-auto bg-white my-8 p-8 rounded-2xl shadow border border-zinc-200">
    <h2 class="text-2xl font-black mb-1">Request a Custom Quote</h2>
    <p class="text-zinc-500 text-sm mb-6">Provide your specifications below. The HNDLT production crew will follow up via WhatsApp.</p>

    <form id="quoteForm" class="space-y-5">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Full Name *</label>
          <input id="full_name" required placeholder="John Doe" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">WhatsApp Number *</label>
          <input id="whatsapp_number" required placeholder="+27 73 088 2155" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Email Address</label>
          <input id="email" type="email" placeholder="name@example.com" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Target Event Date</label>
          <input id="event_date" type="date" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Event Category</label>
          <select id="event_type" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition text-zinc-700">
            <option value="">Select Event Type</option>
            <option>Birthday Party</option>
            <option>Wedding</option>
            <option>Church Service</option>
            <option>Church Conference</option>
            <option>Funeral</option>
            <option>Corporate Event</option>
            <option>School Function</option>
            <option>Brand Activation</option>
            <option>DJ Event</option>
            <option>Private Function</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Venue Location</label>
          <input id="location" placeholder="e.g. Constantia, Cape Town" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Estimated Guest Count</label>
          <input id="guest_count" type="number" placeholder="e.g. 150" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Venue Layout Environment</label>
          <select id="indoor_outdoor" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition text-zinc-700">
            <option value="">Indoor or Outdoor?</option>
            <option>Indoor</option>
            <option>Outdoor</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Select Rental Core System Package</label>
        <select id="selected_package" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition text-zinc-700">
          <option value="">Select Package Base</option>
          <option>Not sure - please recommend</option>
          <option>Value Package 1 - R870/day</option>
          <option>Value Package 2 - R1400/day</option>
          <option>Value Package 3 - R1950/day</option>
          <option>Pro Sound 1 - R1400/day</option>
          <option>Pro Sound 2 - R2350/day</option>
          <option>Premium System 2 - R2600/day</option>
          <option>Church Package</option>
          <option>Wedding Package</option>
          <option>DJ Package</option>
          <option>Corporate Package</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Budget Range Allocation</label>
          <select id="budget_range" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition text-zinc-700">
            <option value="">Select Budget Limit</option>
            <option>Under R1,000</option>
            <option>R1,000 - R2,500</option>
            <option>R2,500 - R5,000</option>
            <option>R5,000 - R10,000</option>
            <option>R10,000+</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Delivery Needed</label>
            <select id="delivery_required" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-sm font-semibold transition text-zinc-700">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Crew Setup Needed</label>
            <select id="setup_required" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-sm font-semibold transition text-zinc-700">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Specific Hardware Components Required</label>
        <input id="equipment_required" placeholder="e.g. 2 Wireless Mics, Smoke Machine, Stage Lighting Par-Cans" class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-1.5">Additional Event Parameters / Extra Notes</label>
        <textarea id="notes" rows="3" placeholder="Provide extra schedule information or setup timelines here..." class="w-full p-3 bg-zinc-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-medium transition"></textarea>
      </div>

      <button id="submitBtn" type="submit" class="w-full bg-black text-white p-4 rounded-xl font-black uppercase tracking-wider hover:bg-zinc-900 transition flex items-center justify-center space-x-2">
        <span>Submit Quote Request</span>
      </button>
    </form>
  </main>

  <footer class="text-center p-6 text-sm text-zinc-500 font-medium border-t bg-white mt-12">
    WhatsApp: +27 73 088 2155 | Instagram: @HANDLT_ZA | Email: handlit.za@gmail.com
  </footer>

  <script>
    const supabaseUrl = "https://lfkssodbanjfamwpscja.supabase.co";
    const supabaseKey = "sb_publishable_5v0yi1RUIc0fhOSBVRiYmg_rCAHZzQG";
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    // Dynamic extraction parsing utility for tracking incoming base pricing rules
    function estimateValue(packageName) {
        if (packageName.includes("870")) return 870;
        if (packageName.includes("1400")) return 1400;
        if (packageName.includes("1950")) return 1950;
        if (packageName.includes("2350")) return 2350;
        if (packageName.includes("2600")) return 2600;
        return null;
    }

    document.getElementById("quoteForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>Processing Pipeline...</span>`;

      const selectedPkg = document.getElementById("selected_package").value;

      const lead = {
        full_name: document.getElementById("full_name").value,
        whatsapp_number: document.getElementById("whatsapp_number").value,
        email: document.getElementById("email").value || null,
        event_date: document.getElementById("event_date").value || null,
        event_type: document.getElementById("event_type").value || null,
        location: document.getElementById("location").value || null,
        guest_count: document.getElementById("guest_count").value ? Number(document.getElementById("guest_count").value) : null,
        indoor_outdoor: document.getElementById("indoor_outdoor").value || null,
        selected_package: selectedPkg || null,
        delivery_required: document.getElementById("delivery_required").value,
        setup_required: document.getElementById("setup_required").value,
        equipment_required: document.getElementById("equipment_required").value || null,
        budget_range: document.getElementById("budget_range").value || null,
        notes: document.getElementById("notes").value || null,
        quote_value: estimateValue(selectedPkg),
        lead_source: 'Website',
        status: "New"
      };

      const { error } = await db.from("client_requests").insert([lead]);

      if (error) {
        alert("Submission Failure: " + error.message);
        console.error(error);
      } else {
        alert("Success! Your detailed event blueprint has been logged with HNDLT.");
        document.getElementById("quoteForm").reset();
      }

      btn.disabled = false;
      btn.innerHTML = "<span>Submit Quote Request</span>";
    });
  </script>
</body>
</html>
