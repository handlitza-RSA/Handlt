    const supabaseKey = "sb_publishable_5v0yi1RUIc0fhOSBVRiYmg_rCAHZzQG";
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById("quoteForm").addEventListener("submit", async function(e) {

      const lead = {
